<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>GWM Euroville · Leads Live</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --red:#CC0000;--bg:#0d0d0d;--bg2:#141414;--bg3:#1a1a1a;--bg4:#222;
  --brd:#252525;--brd2:#333;--tx:#f0f0f0;--tx2:#c0c0c0;--tx3:#909090;
  --Q:#CC0000;--M:#d4850a;--F:#4b8ef0;
  --Qbg:rgba(204,0,0,.12);--Mbg:rgba(212,133,10,.12);--Fbg:rgba(75,142,240,.12)
}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--tx);font-size:13px}

/* TOP BAR */
.bar{background:var(--bg2);border-bottom:1px solid var(--brd);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:54px;position:sticky;top:0;z-index:99;gap:12px;flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:10px}
.badge{background:var(--red);color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:16px;padding:4px 11px;clip-path:polygon(7px 0%,100% 0%,calc(100% - 7px) 100%,0% 100%)}
.logo-t{font-family:'Barlow Condensed',sans-serif;font-size:14px;letter-spacing:2px;text-transform:uppercase;color:var(--tx2)}
.bar-right{display:flex;align-items:center;gap:10px}
.live-pill{display:flex;align-items:center;gap:6px;background:rgba(34,197,94,.07);border:1px solid rgba(34,197,94,.2);border-radius:20px;padding:4px 10px;font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:#22c55e}
.dot{width:6px;height:6px;border-radius:50%;background:#22c55e;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.ts{font-size:10px;color:var(--tx3);font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px;white-space:nowrap}
.btn-ref{background:transparent;border:1px solid var(--brd2);color:var(--tx2);font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:1px;text-transform:uppercase;padding:5px 12px;border-radius:4px;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .2s}
.btn-ref:hover{border-color:var(--red);color:var(--red)}
.btn-ref.spin svg{animation:rotate .8s linear infinite}
@keyframes rotate{to{transform:rotate(360deg)}}

/* LOADING */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;gap:14px;color:var(--tx3)}
.spinner{width:32px;height:32px;border:2px solid var(--brd2);border-top-color:var(--red);border-radius:50%;animation:rotate .7s linear infinite}
.loading-text{font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:1px;text-transform:uppercase}

/* ERROR */
.err-box{background:rgba(204,0,0,.08);border:1px solid rgba(204,0,0,.25);border-left:3px solid var(--red);border-radius:4px;padding:14px 16px;margin:16px 0;font-size:12px;color:#ff8080;line-height:1.6}

/* FILTERS */
.wrap{padding:18px 24px}
.filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.fu{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--tx2)}
select,input[type=date]{background:var(--bg3);border:1px solid var(--brd2);color:var(--tx);font-family:'Barlow',sans-serif;font-size:12px;padding:6px 10px;border-radius:4px;cursor:pointer}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(1);opacity:.7;cursor:pointer}
input[type=date]::-webkit-calendar-picker-indicator:hover{opacity:1}
select:focus,input:focus{outline:none;border-color:var(--red)}
.btn-c{background:transparent;border:1px solid var(--brd2);color:var(--tx2);font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:1px;text-transform:uppercase;padding:6px 12px;border-radius:4px;cursor:pointer;margin-left:auto}
.btn-c:hover{border-color:var(--red);color:var(--red)}

/* TABS */
.tabs{display:flex;gap:3px;margin-bottom:16px;border-bottom:1px solid var(--brd)}
.tab{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;padding:9px 18px;border:none;background:transparent;color:var(--tx2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .2s}
.tab.a{color:var(--red);border-bottom-color:var(--red)}
.tab:hover:not(.a){color:var(--tx)}

/* KPI */
.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px}
.kpi{background:var(--bg2);border:1px solid var(--brd);border-radius:5px;padding:14px 16px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--kc,var(--red))}
.kl{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--tx2);margin-bottom:8px}
.kv{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:800;line-height:1}
.ks{font-size:10px;color:var(--tx2);margin-top:4px}

/* PANELS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.panel{background:var(--bg2);border:1px solid var(--brd);border-radius:5px;padding:16px}
.ptit{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--tx2);margin-bottom:14px;display:flex;align-items:center;gap:6px}
.ptit::before{content:'';width:3px;height:12px;background:var(--red);border-radius:1px;flex-shrink:0}

/* PILLS */
.pill{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:3px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.3px;text-transform:uppercase}
.pQ{background:var(--Qbg);color:var(--Q)}
.pM{background:var(--Mbg);color:var(--M)}
.pF{background:var(--Fbg);color:var(--F)}

/* BAR CHART */
.barchart{display:flex;align-items:flex-end;gap:6px}
.bc{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bv{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;color:var(--tx)}
.bf{width:100%;border-radius:2px 2px 0 0;min-height:3px;transition:height .5s ease}
.bl{font-size:9px;color:var(--tx2);text-align:center;line-height:1.3;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.3px}

/* DONUT */
.dw{display:flex;align-items:center;gap:14px}
.dl{display:flex;flex-direction:column;gap:8px;flex:1}
.dr{display:flex;align-items:center;gap:7px}
.ds{width:7px;height:7px;border-radius:2px;flex-shrink:0}
.dn{font-size:12px;color:var(--tx2);flex:1}
.dv{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700}
.dp{font-size:10px;color:var(--tx2);min-width:30px;text-align:right}

/* TIMELINE */
.tb{display:flex;flex-direction:column;gap:7px}
.tbr{display:flex;align-items:center;gap:8px}
.tbl{font-size:11px;color:var(--tx);width:160px;flex-shrink:0;text-align:right}
.tbt{flex:1;height:5px;background:var(--bg4);border-radius:3px;overflow:hidden}
.tbf{height:100%;border-radius:3px}
.tbv{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;min-width:28px;text-align:right;color:var(--tx)}

/* UNIT CARDS */
.ug{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.uc{background:var(--bg2);border:1px solid var(--brd);border-radius:5px;padding:16px;position:relative;overflow:hidden}
.uc::after{content:'';position:absolute;top:0;left:0;bottom:0;width:3px;background:var(--uc)}
.uh{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;padding-left:12px}
.un{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700}
.ucount{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:800;line-height:1;color:var(--uc)}
.uq{display:flex;gap:6px;margin-bottom:12px;padding-left:12px}
.uqp{flex:1;border-radius:4px;padding:7px 8px;text-align:center}
.uqn{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;display:block;line-height:1}
.uql{font-size:9px;letter-spacing:.8px;text-transform:uppercase;opacity:.8}
.uf{padding-left:12px;border-top:1px solid var(--brd);padding-top:9px;font-size:11px;color:var(--tx2)}
.ubr{margin-top:8px;height:4px;border-radius:2px;overflow:hidden;display:flex;gap:1px}

/* VEHICLE TABLE */
.vt{width:100%;border-collapse:collapse}
.vt td{padding:8px 0;border-top:1px solid var(--brd);vertical-align:middle}
.vt td:not(:first-child){text-align:right;font-family:'Barlow Condensed',sans-serif}
.vt th{font-family:'Barlow Condensed',sans-serif;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--tx2);padding:0 0 10px;text-align:left;font-weight:500}
.vt th:not(:first-child){text-align:right}
.vnm{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;display:flex;align-items:center;gap:7px}
.vdot{width:7px;height:7px;border-radius:2px;flex-shrink:0}
.vtbt{height:3px;background:var(--bg4);border-radius:2px;overflow:hidden;margin-top:3px;width:80px}
.vtbf{height:100%;border-radius:2px}

/* LEAD TABLE */
.tw{background:var(--bg2);border:1px solid var(--brd);border-radius:5px;overflow:hidden}
.tscroll{overflow-x:auto}
table.lt{width:100%;border-collapse:collapse;font-size:12px}
table.lt thead tr{background:var(--bg3);border-bottom:2px solid var(--brd)}
table.lt th{padding:9px 12px;text-align:left;font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--tx2);font-weight:500;white-space:nowrap}
table.lt td{padding:8px 12px;border-bottom:1px solid var(--brd);color:var(--tx2)}
table.lt tr:hover td{background:var(--bg3)}
table.lt tr:last-child td{border-bottom:none}
.tfooter{padding:8px 12px;border-top:1px solid var(--brd);display:flex;justify-content:space-between;font-size:11px;color:var(--tx2);font-family:'Barlow Condensed',sans-serif}

/* QUALITY LEGEND */
.qleg{display:flex;gap:14px;margin-top:10px;font-size:10px;color:var(--tx2);flex-wrap:wrap}
.qleg div{display:flex;align-items:center;gap:5px}
.qleg span{width:7px;height:7px;border-radius:1px;display:inline-block;flex-shrink:0}

::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--brd2)}::-webkit-scrollbar-thumb:hover{background:var(--red)}
@media(max-width:800px){.kpis{grid-template-columns:repeat(3,1fr)}.g2{grid-template-columns:1fr}.ug{grid-template-columns:1fr}}
</style>
</head>
<body>

<header class="bar">
  <div class="logo">
    <div class="badge">GWM</div>
    <div class="logo-t"><span style="color:var(--tx)">Euroville</span> · Leads Formulário Meta</div>
  </div>
  <div class="bar-right">
    <span class="ts" id="ts">Conectando...</span>
    <button class="btn-ref" id="btnRef" onclick="loadData()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
      Atualizar
    </button>
    <div class="live-pill"><div class="dot"></div>Live · Auto 5min</div>
  </div>
</header>

<div class="wrap">
  <div class="filters">
    <span class="fu">Período</span>
    <input type="date" id="fd"/>
    <span style="color:var(--brd2);font-size:14px">—</span>
    <input type="date" id="ft"/>
    <span class="fu" style="margin-left:8px">Veículo</span>
    <select id="fv">
      <option value="">Todos</option>
      <option>H6</option><option>H9</option><option>Tank</option>
      <option>Poer</option><option>Wey</option><option>Ora</option>
    </select>
    <span class="fu">Qualidade</span>
    <select id="fq">
      <option value="">Todas</option>
      <option value="Q">🔥 Quente</option>
      <option value="M">☀️ Morno</option>
      <option value="F">❄️ Frio</option>
    </select>
    <button class="btn-c" onclick="clearF()">↺ Limpar</button>
  </div>

  <div class="tabs">
    <button class="tab a" onclick="setTab('all',this)">Todas</button>
    <button class="tab" onclick="setTab('Juiz de Fora',this)">Juiz de Fora <span id="cnt-jf" style="font-size:10px;opacity:.6"></span></button>
    <button class="tab" onclick="setTab('Pouso Alegre',this)">Pouso Alegre <span id="cnt-pa" style="font-size:10px;opacity:.6"></span></button>
    <button class="tab" onclick="setTab('Uberlândia',this)">Uberlândia <span id="cnt-ub" style="font-size:10px;opacity:.6"></span></button>
    <button class="tab" onclick="setTab('Ipatinga',this)">Ipatinga <span id="cnt-ip" style="font-size:10px;opacity:.6"></span></button>
  </div>

  <div id="kpis" class="kpis"></div>
  <div id="content"><div class="loading"><div class="spinner"></div><div class="loading-text">Conectando ao Google Sheets...</div></div></div>
</div>

<script>
// ── CONFIGURAÇÃO ──────────────────────────────────────────────────────────
const SHEETS = {
  'Juiz de Fora': 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRjswaRcCYMoMFtvBFe8n9i1KCL6HEOeB9yioSnE3VFK4hb356pSznvEY_4lDEJagm_0YxxoGJlaAnY/pub?gid=235713049&single=true&output=csv',
  'Pouso Alegre': 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRjswaRcCYMoMFtvBFe8n9i1KCL6HEOeB9yioSnE3VFK4hb356pSznvEY_4lDEJagm_0YxxoGJlaAnY/pub?gid=1099704196&single=true&output=csv',
  'Uberlândia':   'https://docs.google.com/spreadsheets/d/e/2PACX-1vRjswaRcCYMoMFtvBFe8n9i1KCL6HEOeB9yioSnE3VFK4hb356pSznvEY_4lDEJagm_0YxxoGJlaAnY/pub?gid=575499905&single=true&output=csv',
  'Ipatinga':     'https://docs.google.com/spreadsheets/d/e/2PACX-1vRER5p5jeTViVBxRb_oPCgyY325UAu8-8YWTmG6mWeMFPGjaGpfjdpWSXlMxI3FLLchWRul7K7--_sm/pub?gid=406641320&single=true&output=csv'
};

const UCOLS = {'Juiz de Fora':'#22c55e','Pouso Alegre':'#22c55e','Uberlândia':'#22c55e','Ipatinga':'#22c55e'};
const VCOLS = {H6:'#22c55e',H9:'#22c55e',Tank:'#22c55e',Poer:'#22c55e',Wey:'#22c55e',Ora:'#22c55e'};
const VNAMES = {H6:'Haval H6',H9:'Haval H9',Tank:'Tank 300',Poer:'Poer',Wey:'Wey',Ora:'Ora'};
const TL_LABELS = {
  'imediato':'Imediato',
  'nos_próximos_15_dias':'Próximos 15 dias',
  'em_até_30_dias':'Em até 30 dias',
  'apenas_pesquisando':'Apenas pesquisando',
  'ainda_estou_avaliando':'Ainda avaliando',
  'consigo_financiar_sem_entrada':'Financiar sem entrada'
};

// ── CSV PARSER ────────────────────────────────────────────────────────────
function parseCSV(text) {
  const rows = [];
  const lines = text.replace(/\r/g,'').split('\n');
  for(const line of lines){
    if(!line.trim()) continue;
    const row = [];
    let cur = '', inQ = false;
    for(let i=0;i<line.length;i++){
      if(line[i]==='"'){ inQ=!inQ; continue; }
      if(line[i]===','&&!inQ){ row.push(cur.trim()); cur=''; continue; }
      cur+=line[i];
    }
    row.push(cur.trim());
    rows.push(row);
  }
  return rows;
}

// ── QUALITY ────────────────────────────────────────────────────────────────
function classify(timeline, entrada) {
  const t=(timeline||'').toLowerCase();
  const e=(entrada||'').toLowerCase();
  const hasSim = e.includes('sim');
  if(t.includes('imediato')) return 'Q';
  if(t.includes('próximos_15')||t.includes('proximos_15')){
    return hasSim ? 'Q' : 'M';
  }
  if(t.includes('30')){
    return hasSim ? 'M' : 'F';
  }
  return 'F';
}

function normV(v){
  v=(v||'').toLowerCase().replace(/\s/g,'_');
  if(v.includes('h6')||v.includes('hev2')) return 'H6';
  if(v.includes('h9')) return 'H9';
  if(v.includes('tank')) return 'Tank';
  if(v.includes('poer')) return 'Poer';
  if(v.includes('wey')) return 'Wey';
  if(v.includes('ora')) return 'Ora';
  return 'Outros';
}

// ── FETCH & PARSE ─────────────────────────────────────────────────────────
let ALL_DATA = [];
let tab = 'all';

async function fetchSheet(unit, url) {
  // CORS proxies — tenta em sequência até um funcionar
  const proxies = [
    u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
    u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
    u => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
  ];

  let text = null;
  let lastErr = null;

  for(const proxy of proxies){
    try{
      const res = await fetch(proxy(url), {cache:'no-cache'});
      if(!res.ok) throw new Error(`HTTP ${res.status}`);
      text = await res.text();
      if(text && text.includes(',')) break; // parece CSV válido
    } catch(e){ lastErr = e; text = null; }
  }

  if(!text) throw new Error(`Não foi possível carregar ${unit}: ${lastErr?.message||'erro desconhecido'}`);
  const rows = parseCSV(text);
  if(rows.length < 2) return [];

  // detect header to find column indices
  const hdr = rows[0].map(h=>h.toLowerCase());
  const iDate    = hdr.findIndex(h=>h.includes('created_time'));
  const iPlatform= hdr.findIndex(h=>h==='platform');
  const iVehicle = hdr.findIndex(h=>h.includes('veículo')&&h.includes('interesse'));
  const iTimeline= hdr.findIndex(h=>h.includes('pretende'));
  const iEntrada = hdr.findIndex(h=>h.includes('possui')||( h.includes('entrada')&&h.includes('disponí')));
  const iName    = hdr.findIndex(h=>h==='full_name');
  const iCity    = hdr.findIndex(h=>h==='city');
  const iPhone   = hdr.findIndex(h=>h==='phone_number');

  const leads = [];
  for(let i=1;i<rows.length;i++){
    const r = rows[i];
    if(!r[iDate]) continue;
    const date = (r[iDate]||'').substring(0,10);
    const vehicle  = normV(r[iVehicle]);
    const timeline = (r[iTimeline]||'').toLowerCase().trim();
    const entrada  = (r[iEntrada]||'').toLowerCase().trim();
    leads.push({
      unit,
      date,
      vehicle,
      quality: classify(timeline, entrada),
      name:    (r[iName]||'').substring(0,30),
      city:    (r[iCity]||'').substring(0,25),
      platform:(r[iPlatform]||'').toLowerCase(),
      phone:   (r[iPhone]||'').replace(/[^0-9]/g,'').replace(/^0+/,''),
      timeline,
      entrada
    });
  }
  return leads;
}

async function loadData() {
  const btn = document.getElementById('btnRef');
  btn.classList.add('spin');
  const isFirstLoad = ALL_DATA.length === 0;
  if(isFirstLoad){
    document.getElementById('content').innerHTML = `<div class="loading"><div class="spinner"></div><div class="loading-text">Conectando ao Google Sheets...</div></div>`;
    document.getElementById('kpis').innerHTML = '';
  } else {
    // auto-refresh silencioso — apenas atualiza o indicador
    const ts = document.getElementById('ts');
    if(ts) ts.innerHTML = '<span style="color:var(--M)">↻ Atualizando...</span>';
  }

  try {
    const results = await Promise.allSettled(
      Object.entries(SHEETS).map(([unit,url]) => fetchSheet(unit,url))
    );

    ALL_DATA = [];
    const errors = [];
    results.forEach((r,i) => {
      const unit = Object.keys(SHEETS)[i];
      if(r.status==='fulfilled') ALL_DATA.push(...r.value);
      else errors.push(`${unit}: ${r.reason.message}`);
    });

    // set date range based on data
    if(ALL_DATA.length>0){
      const dates = ALL_DATA.map(d=>d.date).filter(Boolean).sort();
      const fd = document.getElementById('fd');
      const ft = document.getElementById('ft');
      if(!fd.value) fd.value = dates[0];
      if(!ft.value) ft.value = dates[dates.length-1];
    }

    // update tab counts
    ['Juiz de Fora','Pouso Alegre','Uberlândia','Ipatinga'].forEach((u,i) => {
      const ids=['cnt-jf','cnt-pa','cnt-ub','cnt-ip'];
      const cnt = ALL_DATA.filter(d=>d.unit===u).length;
      const el = document.getElementById(ids[i]);
      if(el) el.textContent = cnt ? `(${cnt})` : '';
    });

    // timestamp handled by countdown

    if(errors.length){
      document.getElementById('content').innerHTML =
        `<div class="err-box"><strong>⚠ Erro ao carregar:</strong> ${errors.join(' · ')}<br>Verifique sua conexão com a internet e tente novamente.</div>`;
    }

    render();
    startCountdown();
  } catch(e) {
    document.getElementById('content').innerHTML =
      `<div class="err-box"><strong>⚠ Falha na conexão:</strong> ${e.message}<br>Verifique sua conexão e se as planilhas estão publicadas na web.</div>`;
  } finally {
    btn.classList.remove('spin');
  }
}

// ── FILTERS ───────────────────────────────────────────────────────────────
function getFiltered(){
  const fd = document.getElementById('fd').value;
  const ft = document.getElementById('ft').value;
  const fv = document.getElementById('fv').value;
  const fq = document.getElementById('fq').value;
  return ALL_DATA.filter(d=>{
    if(tab!=='all'&&d.unit!==tab) return false;
    if(fd&&d.date<fd) return false;
    if(ft&&d.date>ft) return false;
    if(fv&&d.vehicle!==fv) return false;
    if(fq&&d.quality!==fq) return false;
    return true;
  });
}

function setTab(t,el){
  tab=t;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('a'));
  el.classList.add('a');
  render();
}

function clearF(){
  if(ALL_DATA.length>0){
    const dates=ALL_DATA.map(d=>d.date).filter(Boolean).sort();
    document.getElementById('fd').value=dates[0];
    document.getElementById('ft').value=dates[dates.length-1];
  }
  document.getElementById('fv').value='';
  document.getElementById('fq').value='';
  render();
}

// ── CHARTS ────────────────────────────────────────────────────────────────
function barChart(items,colors,h=130){
  const mx=Math.max(...items.map(i=>i.v),1);
  return `<div class="barchart" style="height:${h}px;align-items:flex-end">${
    items.map((it,i)=>{
      const bh=Math.max(Math.round(it.v/mx*(h-38)),it.v>0?3:0);
      const c=Array.isArray(colors)?colors[i%colors.length]:colors;
      return `<div class="bc"><div class="bv">${it.v}</div><div class="bf" style="height:${bh}px;background:${c}"></div><div class="bl">${it.l}</div></div>`;
    }).join('')
  }</div>`;
}

function donut(data,size=110){
  const tot=data.reduce((s,d)=>s+d.v,0)||1;
  let cum=0; const r=44,cx=55,cy=55;
  const pol=p=>{const a=p*2*Math.PI-Math.PI/2;return[cx+r*Math.cos(a),cy+r*Math.sin(a)];};
  const paths=data.map(d=>{
    if(!d.v)return'';
    const pct=d.v/tot;
    const[x1,y1]=pol(cum); cum+=pct; const[x2,y2]=pol(cum);
    return`<path d="M${cx} ${cy} L${x1.toFixed(1)} ${y1.toFixed(1)} A${r} ${r} 0 ${pct>.5?1:0} 1 ${x2.toFixed(1)} ${y2.toFixed(1)}Z" fill="${d.c}" stroke="#141414" stroke-width="1.5"/>`;
  }).join('');
  const legend=data.map(d=>`<div class="dr"><div class="ds" style="background:${d.c}"></div><span class="dn">${d.l}</span><span class="dv" style="color:${d.c}">${d.v}</span><span class="dp">${Math.round(d.v/tot*100)}%</span></div>`).join('');
  return`<div class="dw"><svg width="${size}" height="${size}" viewBox="0 0 110 110">${paths}<circle cx="${cx}" cy="${cy}" r="26" fill="#141414"/><text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="middle" font-size="15" font-weight="700" fill="#f0f0f0" font-family="Barlow Condensed,sans-serif">${tot}</text></svg><div class="dl">${legend}</div></div>`;
}

// ── RENDER ─────────────────────────────────────────────────────────────────

  document.getElementById('content').innerHTML = html;
}

// ── AUTO-REFRESH ─────────────────────────────────────────────────────────
const REFRESH_SEC = 5 * 60;
let countdown = REFRESH_SEC;
let countTimer = null;

function startCountdown() {
  clearInterval(countTimer);
  countdown = REFRESH_SEC;
  countTimer = setInterval(() => {
    countdown--;
    const m = String(Math.floor(countdown/60)).padStart(2,'0');
    const s = String(countdown % 60).padStart(2,'0');
    const el = document.getElementById('ts');
    if(!el) return;
    const now = new Date();
    const hm = now.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    const dt = now.toLocaleDateString('pt-BR');
    el.innerHTML = `Atualizado ${dt} às ${hm} &nbsp;·&nbsp; <span style="color:var(--Q)">↺ ${m}:${s}</span>`;
    if(countdown <= 0){ clearInterval(countTimer); loadData(); }
  }, 1000);
}

// ── TABLE FILTERS ─────────────────────────────────────────────────────────
function applyTableFilter(){
  const unit    = (document.getElementById('tf-unit')?.value||'').toLowerCase();
  const vehicle = (document.getElementById('tf-vehicle')?.value||'').toLowerCase();
  const quality = (document.getElementById('tf-quality')?.value||'').toLowerCase();
  const from    = document.getElementById('tf-from')?.value||'';
  const to      = document.getElementById('tf-to')?.value||'';
  const tbody = document.querySelector('#leads-table-wrap tbody');
  if(!tbody) return;
  let shown=0;
  tbody.querySelectorAll('tr').forEach(tr=>{
    const tds = tr.querySelectorAll('td');
    if(!tds.length){ tr.style.display=''; return; }
    const rowText = tr.textContent.toLowerCase();
    let ok = true;
    if(unit    && !rowText.includes(unit))    ok=false;
    if(vehicle && !rowText.includes(VNAMES[vehicle.toUpperCase()]?.toLowerCase()||vehicle)) ok=false;
    if(quality){
      const ql = quality==='q'?'quente':quality==='m'?'morno':'frio';
      if(!rowText.includes(ql)) ok=false;
    }
    if(from||to){
      // find date cell (2nd td)
      const dateText = tds[1]?.textContent||'';
      const parts = dateText.split('/');
      if(parts.length===2){
        const now = new Date();
        const rowDate = `${now.getFullYear()}-${parts[1].padStart(2,'0')}-${parts[0].padStart(2,'0')}`;
        if(from && rowDate<from) ok=false;
        if(to   && rowDate>to)   ok=false;
      }
    }
    tr.style.display = ok?'':'none';
    if(ok) shown++;
  });
}
function clearTableFilter(){
  ['tf-unit','tf-vehicle','tf-quality','tf-from','tf-to'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.value='';
  });
  applyTableFilter();
}

// ── EVENTS ────────────────────────────────────────────────────────────────
['fd','ft','fv','fq'].forEach(id=>document.getElementById(id).addEventListener('change',render));

// ── INIT ──────────────────────────────────────────────────────────────────
loadData();
