<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>GWM Euroville · Leads Live</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800;900&family=Barlow:wght@300;400;500;600;700&family=Inter+Tight:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --red:#E60012; --red-deep:#A50010; --red-bright:#FF1A2E; --red-glow:rgba(230,0,18,.55);
  --bg:#050507; --bg2:#0a0a0e; --bg3:#101015; --bg4:#16161d; --bg5:#1d1d26;
  --brd:rgba(255,255,255,.06); --brd2:rgba(255,255,255,.10); --brd3:rgba(255,255,255,.16);
  --tx:#fafafc; --tx2:#b8b8c4; --tx3:#6f6f7c; --tx4:#46464f;
  --Q:#FF1A2E; --M:#FFB020; --F:#3FA9FF; --ok:#1FD17B;
  --Qbg:rgba(255,26,46,.10); --Mbg:rgba(255,176,32,.10); --Fbg:rgba(63,169,255,.10);
  --gRed:linear-gradient(135deg,#FF2A3E 0%,#E60012 45%,#8E000A 100%);
  --gMetal:linear-gradient(180deg,rgba(255,255,255,.06) 0%,rgba(255,255,255,0) 50%);
  --gPanel:linear-gradient(180deg,rgba(28,28,36,.85) 0%,rgba(14,14,20,.85) 100%);
  --gPanelHi:linear-gradient(180deg,rgba(38,38,48,.92) 0%,rgba(18,18,24,.92) 100%);
  --shadow-card:0 1px 0 rgba(255,255,255,.05) inset, 0 24px 60px -28px rgba(0,0,0,.85), 0 0 0 1px var(--brd);
  --shadow-red:0 0 0 1px rgba(230,0,18,.35), 0 0 40px -8px var(--red-glow);
  --ease:cubic-bezier(.22,.61,.36,1);
}
html,body{background:var(--bg);scroll-behavior:smooth}
body{
  font-family:'Inter Tight','Barlow',system-ui,sans-serif;color:var(--tx);font-size:13px;min-height:100vh;
  letter-spacing:-.005em;
  background:
    radial-gradient(1200px 600px at 8% -8%, rgba(230,0,18,.14), transparent 55%),
    radial-gradient(1000px 520px at 105% 8%, rgba(230,0,18,.06), transparent 60%),
    radial-gradient(700px 400px at 50% 110%, rgba(63,169,255,.04), transparent 60%),
    linear-gradient(180deg,#06060a 0%, #030305 100%);
  background-attachment:fixed;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
/* AURORA + GRID OVERLAY */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    linear-gradient(rgba(255,255,255,.022) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.022) 1px, transparent 1px);
  background-size:56px 56px;
  mask-image:radial-gradient(ellipse at top, #000 25%, transparent 75%);
}
body::after{
  content:'';position:fixed;inset:-20%;pointer-events:none;z-index:0;
  background:
    radial-gradient(closest-side, rgba(230,0,18,.18), transparent 70%) 15% 20%/45% 55% no-repeat,
    radial-gradient(closest-side, rgba(230,0,18,.10), transparent 70%) 85% 30%/40% 50% no-repeat;
  filter:blur(60px);
  animation:aurora 22s ease-in-out infinite alternate;
  opacity:.7;
}
@keyframes aurora{
  0%{transform:translate(0,0) scale(1)}
  50%{transform:translate(40px,-30px) scale(1.05)}
  100%{transform:translate(-40px,30px) scale(.97)}
}
body>*{position:relative;z-index:1}

/* TOP BAR */
.bar{
  background:linear-gradient(180deg, rgba(14,14,20,.78) 0%, rgba(8,8,12,.62) 100%);
  backdrop-filter:blur(22px) saturate(160%);
  -webkit-backdrop-filter:blur(22px) saturate(160%);
  border-bottom:1px solid var(--brd2);
  box-shadow:0 1px 0 rgba(255,255,255,.04) inset, 0 18px 40px -28px rgba(0,0,0,.95);
  padding:0 32px;display:flex;align-items:center;justify-content:space-between;
  height:70px;position:sticky;top:0;z-index:99;gap:14px;flex-wrap:wrap
}
.bar::after{
  content:'';position:absolute;left:0;right:0;bottom:-1px;height:1px;
  background:linear-gradient(90deg,transparent 0%,rgba(230,0,18,.6) 50%,transparent 100%);
  filter:blur(.5px);
}
.logo{display:flex;align-items:center;gap:18px}
.z4p-logo{
  height:28px;width:auto;
  filter:brightness(0) invert(1) drop-shadow(0 0 8px rgba(255,255,255,.12));
  opacity:.95;
  transition:filter .3s, transform .3s
}
.z4p-logo:hover{filter:brightness(0) invert(1) drop-shadow(0 0 14px rgba(255,255,255,.35));transform:scale(1.04)}
.logo-divider{width:1px;height:30px;background:linear-gradient(180deg,transparent,var(--brd3),transparent)}
.badge{
  position:relative;
  background:var(--gRed);color:#fff;font-family:'Barlow Condensed',sans-serif;
  font-weight:800;font-size:18px;letter-spacing:1.5px;
  padding:6px 16px 6px 18px;clip-path:polygon(10px 0%,100% 0%,calc(100% - 10px) 100%,0% 100%);
  box-shadow:0 0 0 1px rgba(255,90,100,.45), 0 8px 24px -8px var(--red-glow);
  text-shadow:0 1px 0 rgba(0,0,0,.45);
  overflow:hidden;
}
.badge::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(110deg,transparent 30%,rgba(255,255,255,.35) 50%,transparent 70%);
  transform:translateX(-120%);
  animation:shimmer 4s ease-in-out infinite;
}
@keyframes shimmer{0%,100%{transform:translateX(-120%)}40%,60%{transform:translateX(120%)}}
.logo-t{font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:2.6px;text-transform:uppercase;color:var(--tx3)}
.logo-t b{color:var(--tx);font-weight:700;letter-spacing:2.8px}
.bar-right{display:flex;align-items:center;gap:12px}
.live-pill{
  display:flex;align-items:center;gap:8px;
  background:linear-gradient(180deg, rgba(31,209,123,.16), rgba(31,209,123,.04));
  border:1px solid rgba(31,209,123,.32);
  border-radius:999px;padding:6px 14px;
  font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:1.6px;text-transform:uppercase;color:#5cf0a4;
  box-shadow:0 0 24px -8px rgba(31,209,123,.5), 0 1px 0 rgba(255,255,255,.05) inset
}
.dot{width:8px;height:8px;border-radius:50%;background:#1FD17B;animation:pulse 1.8s infinite;box-shadow:0 0 0 0 rgba(31,209,123,.7)}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(31,209,123,.8)}70%{box-shadow:0 0 0 10px rgba(31,209,123,0)}100%{box-shadow:0 0 0 0 rgba(31,209,123,0)}}
.ts{font-size:11px;color:var(--tx3);font-family:'JetBrains Mono',monospace;letter-spacing:.2px;white-space:nowrap}
.btn-ref{
  position:relative;
  background:linear-gradient(180deg,#1a1a22,#0e0e14);
  border:1px solid var(--brd2);color:var(--tx2);
  font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:1.6px;text-transform:uppercase;font-weight:600;
  padding:8px 16px;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:7px;
  transition:all .3s var(--ease);
  box-shadow:0 1px 0 rgba(255,255,255,.05) inset, 0 4px 12px -6px rgba(0,0,0,.5)
}
.btn-ref:hover{
  border-color:var(--red);color:#fff;
  background:linear-gradient(180deg,#2a0a10,#170306);
  box-shadow:0 0 0 1px var(--red), 0 0 24px -6px var(--red-glow), 0 1px 0 rgba(255,255,255,.08) inset;
  transform:translateY(-1px)
}
.btn-ref.spin svg{animation:rotate .8s linear infinite}
@keyframes rotate{to{transform:rotate(360deg)}}

/* LOADING */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:420px;gap:22px;color:var(--tx3)}
.spinner{
  width:44px;height:44px;border:2px solid var(--brd2);
  border-top-color:var(--red);border-right-color:var(--red-bright);
  border-radius:50%;animation:rotate .8s linear infinite;
  box-shadow:0 0 32px -4px var(--red-glow)
}
.loading-text{font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:2.4px;text-transform:uppercase;font-weight:600}

/* ERROR */
.err-box{
  background:linear-gradient(180deg,rgba(230,0,18,.12),rgba(230,0,18,.04));
  border:1px solid rgba(230,0,18,.32);border-left:3px solid var(--red);border-radius:10px;
  padding:18px 20px;margin:18px 0;font-size:12px;color:#ffb3b8;line-height:1.6;
  box-shadow:0 0 32px -10px var(--red-glow)
}

/* WRAP */
.wrap{padding:26px 32px 48px;max-width:1640px;margin:0 auto}

/* FILTERS */
.filters{
  display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center;
  padding:14px 16px;background:var(--gPanel);
  border:1px solid var(--brd);border-radius:14px;
  box-shadow:var(--shadow-card);
  backdrop-filter:blur(14px);
  animation:rise .55s var(--ease) both
}
.fu{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:2.2px;text-transform:uppercase;color:var(--tx3);font-weight:700}
select,input[type=date]{
  background:#0c0c12;border:1px solid var(--brd2);color:var(--tx);
  font-family:'Inter Tight','Barlow',sans-serif;font-size:12px;padding:8px 12px;border-radius:8px;cursor:pointer;
  transition:all .25s var(--ease)
}
select:hover,input[type=date]:hover{border-color:var(--brd3);background:#101019}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(1);opacity:.55;cursor:pointer}
input[type=date]::-webkit-calendar-picker-indicator:hover{opacity:1}
select:focus,input:focus{outline:none;border-color:var(--red);box-shadow:0 0 0 3px rgba(230,0,18,.18)}
.btn-c{
  background:transparent;border:1px solid var(--brd2);color:var(--tx2);
  font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:1.6px;text-transform:uppercase;font-weight:600;
  padding:8px 16px;border-radius:8px;cursor:pointer;margin-left:auto;transition:all .25s var(--ease)
}
.btn-c:hover{border-color:var(--red);color:var(--red-bright);background:rgba(230,0,18,.08)}

/* TABS */
.tabs{display:flex;gap:4px;margin-bottom:20px;border-bottom:1px solid var(--brd2);padding:0 2px;flex-wrap:wrap}
.tab{
  font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:1.6px;text-transform:uppercase;
  padding:13px 22px;border:none;background:transparent;color:var(--tx3);cursor:pointer;
  border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .3s var(--ease);position:relative
}
.tab:hover:not(.a){color:var(--tx)}
.tab.a{color:#fff;border-bottom-color:var(--red)}
.tab.a::before{content:'';position:absolute;left:8px;right:8px;bottom:-1px;height:32px;background:linear-gradient(180deg,transparent,rgba(230,0,18,.22));pointer-events:none;border-radius:8px 8px 0 0}
.tab.a::after{content:'';position:absolute;left:50%;bottom:-1px;width:30px;height:2px;background:var(--red-bright);box-shadow:0 0 14px var(--red-glow);transform:translateX(-50%)}

/* KPI */
.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:20px}
.kpi{
  position:relative;overflow:hidden;
  background:var(--gPanel);
  border:1px solid var(--brd);border-radius:14px;padding:20px 22px;
  box-shadow:var(--shadow-card);
  animation:rise .6s var(--ease) both;
  transition:transform .35s var(--ease), box-shadow .35s var(--ease)
}
.kpi:hover{transform:translateY(-3px);box-shadow:var(--shadow-card), 0 20px 50px -20px rgba(0,0,0,.9)}
.kpi:nth-child(2){animation-delay:.06s}.kpi:nth-child(3){animation-delay:.12s}.kpi:nth-child(4){animation-delay:.18s}.kpi:nth-child(5){animation-delay:.24s}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--kc,var(--red)) 30%,var(--kc,var(--red)) 70%,transparent);box-shadow:0 0 20px var(--kc,var(--red))}
.kpi::after{content:'';position:absolute;top:-50%;right:-40%;width:75%;height:180%;background:radial-gradient(circle, var(--kc,var(--red)) 0%, transparent 60%);opacity:.10;pointer-events:none;animation:breathe 6s ease-in-out infinite}
@keyframes breathe{0%,100%{opacity:.08}50%{opacity:.16}}
.kl{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:2.4px;text-transform:uppercase;color:var(--tx3);margin-bottom:12px;font-weight:700;display:flex;align-items:center;gap:8px}
.kl::before{content:'';width:14px;height:1px;background:var(--kc,var(--red));box-shadow:0 0 6px var(--kc,var(--red))}
.kv{font-family:'Barlow Condensed',sans-serif;font-size:40px;font-weight:800;line-height:1;letter-spacing:-.8px;text-shadow:0 0 28px var(--kc,transparent);position:relative}
.ks{font-size:11px;color:var(--tx3);margin-top:8px;font-family:'Barlow Condensed',sans-serif;letter-spacing:.6px;text-transform:uppercase;font-weight:500}

/* PANELS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.panel{
  position:relative;overflow:hidden;
  background:var(--gPanel);
  border:1px solid var(--brd);border-radius:14px;padding:22px;
  box-shadow:var(--shadow-card);
  animation:rise .6s .15s var(--ease) both;
  backdrop-filter:blur(14px)
}
.panel::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.16),transparent)
}
.ptit{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:2.4px;text-transform:uppercase;color:var(--tx2);margin-bottom:18px;display:flex;align-items:center;gap:10px;font-weight:700}
.ptit::before{content:'';width:3px;height:14px;background:var(--gRed);border-radius:2px;flex-shrink:0;box-shadow:0 0 10px var(--red-glow)}

/* PILLS */
.pill{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:999px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;border:1px solid transparent}
.pQ{background:var(--Qbg);color:#ff5d6b;border-color:rgba(255,26,46,.32);box-shadow:0 0 14px -4px rgba(255,26,46,.45)}
.pM{background:var(--Mbg);color:#ffc454;border-color:rgba(255,176,32,.32);box-shadow:0 0 14px -4px rgba(255,176,32,.4)}
.pF{background:var(--Fbg);color:#6dc1ff;border-color:rgba(63,169,255,.32);box-shadow:0 0 14px -4px rgba(63,169,255,.4)}

/* BAR CHART */
.barchart{display:flex;align-items:flex-end;gap:10px;padding-top:8px}
.bc{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;position:relative}
.bv{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;color:var(--tx);letter-spacing:-.3px}
.bf{
  width:100%;border-radius:6px 6px 2px 2px;min-height:4px;
  position:relative;
  background-image:linear-gradient(180deg,rgba(255,255,255,.28) 0%,rgba(255,255,255,.04) 35%,rgba(0,0,0,.18) 100%);
  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,.08),
    inset 0 1px 0 rgba(255,255,255,.25),
    0 -8px 22px -8px currentColor,
    0 0 0 1px rgba(0,0,0,.3);
  transition:height .8s var(--ease);
  animation:grow .9s var(--ease) both;
  transform-origin:bottom
}
.bf::after{
  content:'';position:absolute;left:0;right:0;top:0;height:3px;border-radius:6px 6px 0 0;
  background:linear-gradient(180deg,#fff,transparent);opacity:.5
}
@keyframes grow{from{transform:scaleY(0);opacity:0}to{transform:scaleY(1);opacity:1}}
.bl{font-size:10px;color:var(--tx3);text-align:center;line-height:1.3;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.8px;font-weight:600}

/* DONUT */
.dw{display:flex;align-items:center;gap:22px;flex-wrap:wrap}
.dl{display:flex;flex-direction:column;gap:10px;flex:1;min-width:180px}
.dr{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:8px;transition:all .25s var(--ease);border:1px solid transparent}
.dr:hover{background:rgba(255,255,255,.03);border-color:var(--brd2);transform:translateX(2px)}
.ds{width:10px;height:10px;border-radius:3px;flex-shrink:0;box-shadow:0 0 10px currentColor}
.dn{font-size:12px;color:var(--tx2);flex:1;font-weight:500}
.dv{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;letter-spacing:-.3px}
.dp{font-size:11px;color:var(--tx3);min-width:36px;text-align:right;font-family:'JetBrains Mono',monospace}
.donut-svg{filter:drop-shadow(0 8px 24px rgba(0,0,0,.6));animation:donutIn 1s var(--ease) both}
@keyframes donutIn{from{opacity:0;transform:scale(.85) rotate(-15deg)}to{opacity:1;transform:none}}

/* TIMELINE */
.tb{display:flex;flex-direction:column;gap:11px}
.tbr{display:flex;align-items:center;gap:12px}
.tbl{font-size:11px;color:var(--tx2);width:190px;flex-shrink:0;text-align:right;font-weight:500;letter-spacing:.2px}
.tbt{flex:1;height:9px;background:#080810;border:1px solid var(--brd2);border-radius:6px;overflow:hidden;position:relative;box-shadow:inset 0 1px 2px rgba(0,0,0,.6)}
.tbf{height:100%;border-radius:5px;background-image:linear-gradient(180deg,rgba(255,255,255,.32) 0%,rgba(255,255,255,0) 40%,rgba(0,0,0,.2) 100%);box-shadow:0 0 16px -2px currentColor, inset 0 1px 0 rgba(255,255,255,.3);animation:slide 1s var(--ease) both;transform-origin:left;position:relative}
.tbf::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.18),transparent);transform:translateX(-100%);animation:bar-shimmer 3s ease-in-out infinite}
@keyframes bar-shimmer{0%{transform:translateX(-100%)}60%,100%{transform:translateX(200%)}}
@keyframes slide{from{transform:scaleX(0)}to{transform:scaleX(1)}}
.tbv{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;min-width:32px;text-align:right;color:var(--tx);letter-spacing:-.3px}

/* UNIT CARDS */
.ug{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.uc{
  position:relative;overflow:hidden;
  background:var(--gPanel);
  border:1px solid var(--brd);border-radius:14px;padding:22px 22px 20px 24px;
  box-shadow:var(--shadow-card);
  transition:transform .35s var(--ease), box-shadow .35s var(--ease), border-color .35s var(--ease);
  animation:rise .6s var(--ease) both;
  backdrop-filter:blur(14px)
}
.uc:hover{transform:translateY(-4px);border-color:var(--brd3);box-shadow:0 1px 0 rgba(255,255,255,.06) inset, 0 30px 60px -24px rgba(0,0,0,.95)}
.uc::after{content:'';position:absolute;top:0;left:0;bottom:0;width:3px;background:var(--uc);box-shadow:0 0 24px var(--uc), 0 0 8px var(--uc)}
.uc::before{content:'';position:absolute;top:-50%;right:-30%;width:70%;height:170%;background:radial-gradient(circle,var(--uc) 0%, transparent 60%);opacity:.08;pointer-events:none}
.uh{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.un{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;letter-spacing:.6px}
.ucount{font-family:'Barlow Condensed',sans-serif;font-size:40px;font-weight:800;line-height:1;color:var(--uc);text-shadow:0 0 24px var(--uc);letter-spacing:-1.2px}
.uq{display:flex;gap:8px;margin-bottom:14px}
.uqp{flex:1;border-radius:8px;padding:9px 10px;text-align:center;border:1px solid transparent;transition:transform .2s var(--ease)}
.uqp:hover{transform:translateY(-2px)}
.uqp:nth-child(1){border-color:rgba(255,26,46,.22);background:rgba(255,26,46,.05)}
.uqp:nth-child(2){border-color:rgba(255,176,32,.22);background:rgba(255,176,32,.05)}
.uqp:nth-child(3){border-color:rgba(63,169,255,.22);background:rgba(63,169,255,.05)}
.uqn{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;display:block;line-height:1;letter-spacing:-.5px}
.uql{font-size:9px;letter-spacing:1.2px;text-transform:uppercase;opacity:.9;font-weight:700}
.uf{border-top:1px solid var(--brd2);padding-top:12px;font-size:11px;color:var(--tx3);font-family:'Barlow Condensed',sans-serif;letter-spacing:.6px;text-transform:uppercase}
.uf strong{color:var(--tx)!important;font-weight:700;letter-spacing:.8px}
.ubr{margin-top:11px;height:6px;border-radius:4px;overflow:hidden;display:flex;gap:1px;background:#070710;box-shadow:inset 0 1px 2px rgba(0,0,0,.6)}
.ubr>div{background-image:linear-gradient(180deg,rgba(255,255,255,.32),transparent 60%)!important;box-shadow:0 0 8px -2px currentColor}

/* VEHICLE TABLE */
.vt{width:100%;border-collapse:collapse}
.vt td{padding:12px 0;border-top:1px solid var(--brd);vertical-align:middle}
.vt tr:hover td{background:rgba(255,255,255,.015)}
.vt td:not(:first-child){text-align:right;font-family:'Barlow Condensed',sans-serif}
.vt th{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--tx3);padding:0 0 14px;text-align:left;font-weight:700}
.vt th:not(:first-child){text-align:right}
.vnm{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;display:flex;align-items:center;gap:10px;letter-spacing:.3px}
.vdot{width:9px;height:9px;border-radius:50%;flex-shrink:0;box-shadow:0 0 10px currentColor, 0 0 4px currentColor}
.vtbt{height:6px;background:#070710;border:1px solid var(--brd);border-radius:4px;overflow:hidden;margin-top:3px;width:130px;margin-left:auto;box-shadow:inset 0 1px 2px rgba(0,0,0,.6)}
.vtbf{height:100%;border-radius:3px;background-image:linear-gradient(180deg,rgba(255,255,255,.32),transparent 50%);box-shadow:0 0 10px currentColor;animation:slide 1s var(--ease) both;transform-origin:left}

/* LEAD TABLE */
.tw{background:var(--gPanel);border:1px solid var(--brd);border-radius:0 0 14px 14px;overflow:hidden;box-shadow:var(--shadow-card);backdrop-filter:blur(14px)}
.tscroll{overflow-x:auto}
table.lt{width:100%;border-collapse:collapse;font-size:12px}
table.lt thead tr{background:linear-gradient(180deg,#1a1a22,#0f0f15);border-bottom:1px solid var(--brd2)}
table.lt th{padding:13px 16px;text-align:left;font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--tx3);font-weight:700;white-space:nowrap}
table.lt td{padding:11px 16px;border-bottom:1px solid var(--brd);color:var(--tx2)}
table.lt tbody tr{transition:background .2s var(--ease)}
table.lt tr:hover td{background:linear-gradient(90deg,rgba(230,0,18,.06),transparent)}
table.lt tr:last-child td{border-bottom:none}
.tfooter{padding:13px 16px;border-top:1px solid var(--brd2);display:flex;justify-content:space-between;font-size:11px;color:var(--tx3);font-family:'Barlow Condensed',sans-serif;letter-spacing:1.2px;text-transform:uppercase;background:rgba(8,8,14,.6);font-weight:600}

/* QUALITY LEGEND */
.qleg{display:flex;gap:20px;margin-top:16px;font-size:11px;color:var(--tx3);flex-wrap:wrap;padding:14px 18px;background:var(--gPanel);border:1px solid var(--brd);border-radius:14px;box-shadow:var(--shadow-card)}
.qleg div{display:flex;align-items:center;gap:8px}
.qleg span{width:9px;height:9px;border-radius:3px;display:inline-block;flex-shrink:0;box-shadow:0 0 10px currentColor}

::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:linear-gradient(180deg,var(--brd3),var(--brd2));border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--red)}

@media(max-width:1100px){.kpis{grid-template-columns:repeat(3,1fr)}}
@media(max-width:900px){.kpis{grid-template-columns:repeat(2,1fr)}.g2{grid-template-columns:1fr}.ug{grid-template-columns:1fr}.bar{padding:0 18px;height:auto;padding-top:12px;padding-bottom:12px}.wrap{padding:18px}}
</style>
</head>

    <button class="tab a" onclick="setTab('all',this)">Todas</button>
    <button class="tab" onclick="setTab('Juiz de Fora',this)">Juiz de Fora <span id="cnt-jf" style="font-size:10px;opacity:.6"></span></button>
    <button class="tab" onclick="setTab('Pouso Alegre',this)">Pouso Alegre <span id="cnt-pa" style="font-size:10px;opacity:.6"></span></button>
    <button class="tab" onclick="setTab('Uberlândia',this)">Uberlândia <span id="cnt-ub" style="font-size:10px;opacity:.6"></span></button>
    <button class="tab" onclick="setTab('Ipatinga',this)">Ipatinga <span id="cnt-ip" style="font-size:10px;opacity:.6"></span></button>
  </div>

  <div id="kpis" class="kpis"></div>
  <div id="content"><div class="loading"><div class="spinner"></div><div class="loading-text">Conectando ao Google Sheets...</div></div></div>
</div>

<script>
// ── CONFIGURAÇÃO ──────────────────────────────────────────────────────────
const SHEETS = {
  'Juiz de Fora': 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRjswaRcCYMoMFtvBFe8n9i1KCL6HEOeB9yioSnE3VFK4hb356pSznvEY_4lDEJagm_0YxxoGJlaAnY/pub?gid=235713049&single=true&output=csv',
  'Pouso Alegre': 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRjswaRcCYMoMFtvBFe8n9i1KCL6HEOeB9yioSnE3VFK4hb356pSznvEY_4lDEJagm_0YxxoGJlaAnY/pub?gid=1099704196&single=true&output=csv',
  'Uberlândia':   'https://docs.google.com/spreadsheets/d/e/2PACX-1vRjswaRcCYMoMFtvBFe8n9i1KCL6HEOeB9yioSnE3VFK4hb356pSznvEY_4lDEJagm_0YxxoGJlaAnY/pub?gid=575499905&single=true&output=csv',
  'Ipatinga':     'https://docs.google.com/spreadsheets/d/e/2PACX-1vRER5p5jeTViVBxRb_oPCgyY325UAu8-8YWTmG6mWeMFPGjaGpfjdpWSXlMxI3FLLchWRul7K7--_sm/pub?gid=406641320&single=true&output=csv'
};

const UCOLS = {'Juiz de Fora':'#22c55e','Pouso Alegre':'#3b82f6','Uberlândia':'#f59e0b','Ipatinga':'#a855f7'};
const VCOLS = {H6:'#ef4444',H9:'#f97316',Tank:'#eab308',Poer:'#22c55e',Wey:'#3b82f6',Ora:'#a855f7'};
const VNAMES = {H6:'Haval H6',H9:'Haval H9',Tank:'Tank 300',Poer:'Poer',Wey:'Wey',Ora:'Ora'};
const TL_LABELS = {
  'imediato':'Imediato',
  'nos_próximos_15_dias':'Próximos 15 dias',
  'em_até_30_dias':'Em até 30 dias',
  'apenas_pesquisando':'Apenas pesquisando',
  'ainda_estou_avaliando':'Ainda avaliando',
  'consigo_financiar_sem_entrada':'Financiar sem entrada'
};

// ── CSV PARSER ────────────────────────────────────────────────────────────
function parseCSV(text) {
  const rows = [];
  const lines = text.replace(/\r/g,'').split('\n');
  for(const line of lines){
    if(!line.trim()) continue;
    const row = [];
    let cur = '', inQ = false;
    for(let i=0;i<line.length;i++){
      if(line[i]==='"'){ inQ=!inQ; continue; }
      if(line[i]===','&&!inQ){ row.push(cur.trim()); cur=''; continue; }
      cur+=line[i];
    }
    row.push(cur.trim());
    rows.push(row);
  }
  return rows;
}

// ── QUALITY ────────────────────────────────────────────────────────────────
function classify(timeline, entrada) {
  const t=(timeline||'').toLowerCase();
  const e=(entrada||'').toLowerCase();
  const hasSim = e.includes('sim');
  if(t.includes('imediato')) return 'Q';
  if(t.includes('próximos_15')||t.includes('proximos_15')){
    return hasSim ? 'Q' : 'M';
  }
  if(t.includes('30')){
    return hasSim ? 'M' : 'F';
  }
  return 'F';
}

function normV(v){
  v=(v||'').toLowerCase().replace(/\s/g,'_');
  if(v.includes('h6')||v.includes('hev2')) return 'H6';
  if(v.includes('h9')) return 'H9';
  if(v.includes('tank')) return 'Tank';
  if(v.includes('poer')) return 'Poer';
  if(v.includes('wey')) return 'Wey';
  if(v.includes('ora')) return 'Ora';
  return 'Outros';
}

// ── FETCH & PARSE ─────────────────────────────────────────────────────────
let ALL_DATA = [];
let tab = 'all';

async function fetchSheet(unit, url) {
  const proxies = [
    u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
    u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
    u => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`,
  ];

  let text = null;
  let lastErr = null;

  for(const proxy of proxies){
    try{
      const res = await fetch(proxy(url), {cache:'no-cache'});
      if(!res.ok) throw new Error(`HTTP ${res.status}`);
      text = await res.text();
      if(text && text.includes(',')) break;
    } catch(e){ lastErr = e; text = null; }
  }

  if(!text) throw new Error(`Não foi possível carregar ${unit}: ${lastErr?.message||'erro desconhecido'}`);
  const rows = parseCSV(text);
  if(rows.length < 2) return [];

  const hdr = rows[0].map(h=>h.toLowerCase());
  const iDate    = hdr.findIndex(h=>h.includes('created_time'));
  const iPlatform= hdr.findIndex(h=>h==='platform');
  const iVehicle = hdr.findIndex(h=>h.includes('veículo')&&h.includes('interesse'));
  const iTimeline= hdr.findIndex(h=>h.includes('pretende'));
  const iEntrada = hdr.findIndex(h=>h.includes('possui')||( h.includes('entrada')&&h.includes('disponí')));
  const iName    = hdr.findIndex(h=>h==='full_name');
  const iCity    = hdr.findIndex(h=>h==='city');
  const iPhone   = hdr.findIndex(h=>h==='phone_number');

  const leads = [];
  for(let i=1;i<rows.length;i++){
    const r = rows[i];
    if(!r[iDate]) continue;
    const date = (r[iDate]||'').substring(0,10);
    const vehicle  = normV(r[iVehicle]);
    const timeline = (r[iTimeline]||'').toLowerCase().trim();
    const entrada  = (r[iEntrada]||'').toLowerCase().trim();
    leads.push({
      unit, date, vehicle,
      quality: classify(timeline, entrada),
      name:    (r[iName]||'').substring(0,30),
      city:    (r[iCity]||'').substring(0,25),
      platform:(r[iPlatform]||'').toLowerCase(),
      phone:   (r[iPhone]||'').replace(/[^0-9]/g,'').replace(/^0+/,''),
      timeline, entrada
    });
  }
  return leads;
}

async function loadData() {
  const btn = document.getElementById('btnRef');
  btn.classList.add('spin');
  const isFirstLoad = ALL_DATA.length === 0;
  if(isFirstLoad){
    document.getElementById('content').innerHTML = `<div class="loading"><div class="spinner"></div><div class="loading-text">Conectando ao Google Sheets...</div></div>`;
    document.getElementById('kpis').innerHTML = '';
  } else {
    const ts = document.getElementById('ts');
    if(ts) ts.innerHTML = '<span style="color:var(--M)">↻ Atualizando...</span>';
  }

  try {
    const results = await Promise.allSettled(
      Object.entries(SHEETS).map(([unit,url]) => fetchSheet(unit,url))
    );

    ALL_DATA = [];
    const errors = [];
    results.forEach((r,i) => {
      const unit = Object.keys(SHEETS)[i];
      if(r.status==='fulfilled') ALL_DATA.push(...r.value);
      else errors.push(`${unit}: ${r.reason.message}`);
    });

    if(ALL_DATA.length>0){
      const dates = ALL_DATA.map(d=>d.date).filter(Boolean).sort();
      const fd = document.getElementById('fd');
      const ft = document.getElementById('ft');
      if(!fd.value) fd.value = dates[0];
      if(!ft.value) ft.value = dates[dates.length-1];
    }

    ['Juiz de Fora','Pouso Alegre','Uberlândia','Ipatinga'].forEach((u,i) => {
      const ids=['cnt-jf','cnt-pa','cnt-ub','cnt-ip'];
      const cnt = ALL_DATA.filter(d=>d.unit===u).length;
      const el = document.getElementById(ids[i]);
      if(el) el.textContent = cnt ? `(${cnt})` : '';
    });

    if(errors.length){
      document.getElementById('content').innerHTML =
        `<div class="err-box"><strong>⚠ Erro ao carregar:</strong> ${errors.join(' · ')}<br>Verifique sua conexão com a internet e tente novamente.</div>`;
    }

    render();
    startCountdown();
  } catch(e) {
    document.getElementById('content').innerHTML =
      `<div class="err-box"><strong>⚠ Falha na conexão:</strong> ${e.message}<br>Verifique sua conexão e se as planilhas estão publicadas na web.</div>`;
  } finally {
    btn.classList.remove('spin');
  }
}

// ── FILTERS ───────────────────────────────────────────────────────────────
function getFiltered(){
  const fd = document.getElementById('fd').value;
  const ft = document.getElementById('ft').value;
  const fv = document.getElementById('fv').value;
  const fq = document.getElementById('fq').value;
  return ALL_DATA.filter(d=>{
    if(tab!=='all'&&d.unit!==tab) return false;
    if(fd&&d.date<fd) return false;
    if(ft&&d.date>ft) return false;
    if(fv&&d.vehicle!==fv) return false;
    if(fq&&d.quality!==fq) return false;
    return true;
  });
}

function setTab(t,el){
  tab=t;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('a'));
  el.classList.add('a');
  render();
}

function clearF(){
  if(ALL_DATA.length>0){
    const dates=ALL_DATA.map(d=>d.date).filter(Boolean).sort();
    document.getElementById('fd').value=dates[0];
    document.getElementById('ft').value=dates[dates.length-1];
  }
  document.getElementById('fv').value='';
  document.getElementById('fq').value='';
  render();
}

// ── CHARTS ────────────────────────────────────────────────────────────────
function barChart(items,colors,h=180){
  const mx=Math.max(...items.map(i=>i.v),1);
  const W = Math.max(items.length*70, 360);
  const padX=24, padTop=30, padBot=46;
  const bw = (W - padX*2) / items.length - 12;
  const innerH = h - padTop - padBot;
  let defs = '<defs>';
  items.forEach((it,i)=>{
    const c=Array.isArray(colors)?colors[i%colors.length]:colors;
    defs += `<linearGradient id="bg${i}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${c}" stop-opacity="1"/>
      <stop offset="55%" stop-color="${c}" stop-opacity=".85"/>
      <stop offset="100%" stop-color="${c}" stop-opacity=".35"/>
    </linearGradient>
    <filter id="bgl${i}" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>`;
  });
  defs += '</defs>';
  let bars='', labels='', values='', grid='';
  for(let g=0;g<=4;g++){
    const y = padTop + innerH*(g/4);
    grid += `<line x1="${padX}" y1="${y}" x2="${W-padX}" y2="${y}" stroke="rgba(255,255,255,.04)" stroke-width="1" stroke-dasharray="2,4"/>`;
  }
  items.forEach((it,i)=>{
    const c=Array.isArray(colors)?colors[i%colors.length]:colors;
    const bh = Math.max(Math.round(it.v/mx*innerH), it.v>0?4:0);
    const x = padX + i*((W-padX*2)/items.length) + 6;
    const y = padTop + innerH - bh;
    const w = bw;
    bars += `<rect x="${x}" y="${y}" width="${w}" height="${bh}" rx="5" ry="5" fill="url(#bg${i})" filter="url(#bgl${i})" style="transform-origin:${x+w/2}px ${padTop+innerH}px;animation:grow .9s cubic-bezier(.22,.61,.36,1) both;animation-delay:${i*60}ms"/>
      <rect x="${x}" y="${y}" width="${w}" height="2" rx="1" fill="rgba(255,255,255,.55)" style="animation:grow .9s cubic-bezier(.22,.61,.36,1) both;animation-delay:${i*60}ms"/>`;
    values += `<text x="${x+w/2}" y="${y-8}" text-anchor="middle" font-family="Barlow Condensed,sans-serif" font-weight="800" font-size="14" fill="#fff" style="text-shadow:0 0 8px ${c}">${it.v}</text>`;
    labels += `<text x="${x+w/2}" y="${h-14}" text-anchor="middle" font-family="Barlow Condensed,sans-serif" font-weight="600" font-size="10" letter-spacing="1" fill="#6f6f7c" text-transform="uppercase">${(it.l||'').toUpperCase()}</text>`;
  });
  return `<div style="width:100%;overflow-x:auto"><svg viewBox="0 0 ${W} ${h}" width="100%" preserveAspectRatio="xMidYMid meet" style="display:block;min-width:${W}px;max-width:100%">${defs}${grid}${bars}${values}${labels}</svg></div>`;
}


function donut(data,size=180){
  const tot=data.reduce((s,d)=>s+d.v,0)||1;
  const cx=size/2, cy=size/2, r=size/2-14, sw=22;
  const C = 2*Math.PI*r;
  let defs='<defs>';
  data.forEach((d,i)=>{
    defs += `<linearGradient id="dg${i}" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="${d.c}" stop-opacity="1"/>
      <stop offset="100%" stop-color="${d.c}" stop-opacity=".55"/>
    </linearGradient>
    <filter id="df${i}" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>`;
  });
  defs+='</defs>';
  // background ring
  let ring=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(255,255,255,.04)" stroke-width="${sw}"/>`;
  let off=0;
  data.forEach((d,i)=>{
    if(!d.v) return;
    const len = (d.v/tot)*C;
    ring += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="url(#dg${i})" stroke-width="${sw}" stroke-linecap="butt"
      stroke-dasharray="${len.toFixed(2)} ${(C-len).toFixed(2)}"
      stroke-dashoffset="${(-off).toFixed(2)}"
      transform="rotate(-90 ${cx} ${cy})"
      filter="url(#df${i})"
      style="opacity:0;animation:donutSeg .9s cubic-bezier(.22,.61,.36,1) forwards;animation-delay:${i*120}ms"/>`;
    off += len;
  });
  // glossy inner shadow
  const inner = `<circle cx="${cx}" cy="${cy}" r="${r-sw/2-2}" fill="#0a0a10" stroke="rgba(255,255,255,.06)" stroke-width="1"/>
    <circle cx="${cx}" cy="${cy}" r="${r-sw/2-2}" fill="url(#dgBG)"/>`;
  defs = defs.replace('</defs>',`<radialGradient id="dgBG" cx="50%" cy="40%" r="60%"><stop offset="0%" stop-color="rgba(255,255,255,.06)"/><stop offset="100%" stop-color="rgba(0,0,0,0)"/></radialGradient></defs>`);
  const totalTxt = `<text x="${cx}" y="${cy-2}" text-anchor="middle" dominant-baseline="middle" font-size="34" font-weight="800" fill="#fafafc" font-family="Barlow Condensed,sans-serif" letter-spacing="-1">${tot}</text>
    <text x="${cx}" y="${cy+22}" text-anchor="middle" dominant-baseline="middle" font-size="9" letter-spacing="2.4" fill="#6f6f7c" font-family="Barlow Condensed,sans-serif" font-weight="700">TOTAL LEADS</text>`;
  const legend=data.map(d=>`<div class="dr"><div class="ds" style="background:${d.c};color:${d.c}"></div><span class="dn">${d.l}</span><span class="dv" style="color:${d.c}">${d.v}</span><span class="dp">${Math.round(d.v/tot*100)}%</span></div>`).join('');
  return`<div class="dw"><svg class="donut-svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${defs}${ring}${inner}${totalTxt}</svg><div class="dl">${legend}</div></div>
    <style>@keyframes donutSeg{from{opacity:0;stroke-dasharray:0 ${C.toFixed(2)}}to{opacity:1}}</style>`;
}


// ── RENDER ─────────────────────────────────────────────────────────────────
function render(){
  if(!ALL_DATA.length) return;
  const f = getFiltered();
  const Q=f.filter(d=>d.quality==='Q').length;
  const M=f.filter(d=>d.quality==='M').length;
  const F=f.filter(d=>d.quality==='F').length;
  const tot=f.length;

  const vCounts=[...Object.keys(VCOLS)].map(v=>({k:v,n:f.filter(d=>d.vehicle===v).length}));
  const topV=(vCounts.sort((a,b)=>b.n-a.n)[0]?.k)||'—';

  document.getElementById('kpis').innerHTML=[
    {l:'Total de Leads',v:tot,c:'#22c55e',s:tab==='all'?'4 unidades':''},
    {l:'Leads Quentes',v:Q,c:'#ff2d2d',s:tot?Math.round(Q/tot*100)+'% do total':''},
    {l:'Leads Mornos',v:M,c:'#f59e0b',s:tot?Math.round(M/tot*100)+'% do total':''},
    {l:'Leads Frios',v:F,c:'#3b82f6',s:tot?Math.round(F/tot*100)+'% do total':''},
    {l:'Modelo Líder',v:VNAMES[topV]||'—',c:'#a855f7',s:vCounts[0]?.n?`${vCounts[0].n} leads`:''},
  ].map(k=>`<div class="kpi" style="--kc:${k.c}"><div class="kl">${k.l}</div><div class="kv" style="color:${k.c}">${k.v}</div><div class="ks">${k.s}</div></div>`).join('');

  let html='';
  const vKeys=Object.keys(VCOLS);

  if(tab==='all'){
    const byU=['Juiz de Fora','Pouso Alegre','Uberlândia','Ipatinga'].map((u,i)=>({l:u==='Juiz de Fora'?'JF':u==='Pouso Alegre'?'PA':u==='Uberlândia'?'UBE':'IPA',v:f.filter(d=>d.unit===u).length}));
    html+=`<div class="g2">
      <div class="panel"><div class="ptit">Leads por Unidade</div>${barChart(byU,Object.values(UCOLS),160)}</div>
      <div class="panel"><div class="ptit">Qualidade dos Leads</div>${donut([{l:'Quente',v:Q,c:'#ff2d2d'},{l:'Morno',v:M,c:'#f59e0b'},{l:'Frio',v:F,c:'#3b82f6'}])}</div>
    </div>`;

    const vData=vKeys.map(v=>{const vl=f.filter(d=>d.vehicle===v);return{v,n:vl.length,Q:vl.filter(d=>d.quality==='Q').length,M:vl.filter(d=>d.quality==='M').length,F:vl.filter(d=>d.quality==='F').length};}).sort((a,b)=>b.n-a.n);
    const mxV=Math.max(...vData.map(v=>v.n),1);
    html+=`<div class="panel" style="margin-bottom:14px"><div class="ptit">Desempenho por Modelo</div>
      <div style="overflow-x:auto"><table class="vt"><thead><tr><th>Modelo</th><th style="min-width:130px">Distribuição</th><th>Total</th><th>🔥Q</th><th>☀️M</th><th>❄️F</th></tr></thead>
      <tbody>${vData.map(v=>`<tr>
        <td><div class="vnm"><span class="vdot" style="background:${VCOLS[v.v]};color:${VCOLS[v.v]}"></span><span style="color:var(--tx)">${VNAMES[v.v]}</span></div></td>
        <td><div class="vtbt"><div class="vtbf" style="width:${Math.round(v.n/mxV*100)}%;background:${VCOLS[v.v]};color:${VCOLS[v.v]}"></div></div></td>
        <td style="font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;color:var(--tx)">${v.n}</td>
        <td style="color:#ff5d5d;font-weight:700;font-size:14px">${v.Q}</td>
        <td style="color:#fbbf24;font-weight:700;font-size:14px">${v.M}</td>
        <td style="color:#60a5fa;font-weight:700;font-size:14px">${v.F}</td>
      </tr>`).join('')}</tbody></table></div></div>`;

    html+=`<div class="ug" style="margin-bottom:14px">${['Juiz de Fora','Pouso Alegre','Uberlândia','Ipatinga'].map((u,i)=>{
      const ul=f.filter(d=>d.unit===u);
      const uQ=ul.filter(d=>d.quality==='Q').length,uM=ul.filter(d=>d.quality==='M').length,uF=ul.filter(d=>d.quality==='F').length;
      const cnt={};ul.forEach(d=>cnt[d.vehicle]=(cnt[d.vehicle]||0)+1);
      const topV2=Object.entries(cnt).sort((a,b)=>b[1]-a[1])[0];
      const col=Object.values(UCOLS)[i];
      return`<div class="uc" style="--uc:${col}">
        <div class="uh"><div class="un">${u}</div><div class="ucount" style="color:${col}">${ul.length}</div></div>
        <div class="uq">
          <div class="uqp" style="background:var(--Qbg)"><span class="uqn" style="color:#ff5d5d">${uQ}</span><span class="uql" style="color:#ff5d5d">Quentes</span></div>
          <div class="uqp" style="background:var(--Mbg)"><span class="uqn" style="color:#fbbf24">${uM}</span><span class="uql" style="color:#fbbf24">Mornos</span></div>
          <div class="uqp" style="background:var(--Fbg)"><span class="uqn" style="color:#60a5fa">${uF}</span><span class="uql" style="color:#60a5fa">Frios</span></div>
        </div>
        <div class="uf">Mais demandado: <strong>${topV2?VNAMES[topV2[0]]||topV2[0]+' ('+topV2[1]+')':'—'}</strong>
          ${ul.length?`<div class="ubr"><div style="flex:${uQ||0};background:#ff2d2d"></div><div style="flex:${uM||0};background:#f59e0b"></div><div style="flex:${uF||0};background:#3b82f6"></div></div>`:''}
        </div>
      </div>`;
    }).join('')}</div>`;

  } else {
    html+=`<div class="g2">
      <div class="panel"><div class="ptit">Leads por Modelo</div>${barChart(vKeys.map(v=>({l:v,v:f.filter(d=>d.vehicle===v).length})),Object.values(VCOLS),160)}</div>
      <div class="panel"><div class="ptit">Qualidade</div>${donut([{l:'Quente',v:Q,c:'#ff2d2d'},{l:'Morno',v:M,c:'#f59e0b'},{l:'Frio',v:F,c:'#3b82f6'}])}</div>
    </div>`;

    const tlOrder=['imediato','nos_próximos_15_dias','em_até_30_dias','apenas_pesquisando','ainda_estou_avaliando','consigo_financiar_sem_entrada'];
    const tlData=tlOrder.map(t=>({l:TL_LABELS[t]||t,v:f.filter(d=>d.timeline===t).length,c:t==='imediato'?'#ff2d2d':t.includes('15')?'#f59e0b':t.includes('30')?'#eab308':'#3b82f6'})).filter(d=>d.v>0);
    const mxTL=Math.max(...tlData.map(d=>d.v),1);
    html+=`<div class="panel" style="margin-bottom:14px"><div class="ptit">Intenção de Compra</div>
      <div class="tb">${tlData.map(t=>`<div class="tbr"><div class="tbl">${t.l}</div><div class="tbt"><div class="tbf" style="width:${Math.round(t.v/mxTL*100)}%;background:${t.c};color:${t.c}"></div></div><div class="tbv">${t.v}</div></div>`).join('')}</div>
    </div>`;
  }

  const tfUnits = ['Juiz de Fora','Pouso Alegre','Uberlândia','Ipatinga'];
  const tfVehicles = Object.keys(VCOLS);
  const tableFiltersHTML = `
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:0;padding:14px 16px;background:linear-gradient(180deg,#1a1a22,#13131a);border:1px solid var(--brd);border-bottom:none;border-radius:10px 10px 0 0;">
      <span style="font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:1.8px;text-transform:uppercase;color:var(--tx3);font-weight:600">Filtrar tabela</span>
      ${tab==='all'?`<select id="tf-unit" onchange="applyTableFilter()" style="background:#0f0f13;border:1px solid var(--brd2);color:var(--tx);font-family:'Barlow',sans-serif;font-size:11px;padding:6px 9px;border-radius:5px">
        <option value="">Todas as unidades</option>
        ${tfUnits.map(u=>`<option value="${u}">${u}</option>`).join('')}
      </select>`:''}
      <select id="tf-vehicle" onchange="applyTableFilter()" style="background:#0f0f13;border:1px solid var(--brd2);color:var(--tx);font-family:'Barlow',sans-serif;font-size:11px;padding:6px 9px;border-radius:5px">
        <option value="">Todos os modelos</option>
        ${tfVehicles.map(v=>`<option value="${v}">${VNAMES[v]}</option>`).join('')}
      </select>
      <select id="tf-quality" onchange="applyTableFilter()" style="background:#0f0f13;border:1px solid var(--brd2);color:var(--tx);font-family:'Barlow',sans-serif;font-size:11px;padding:6px 9px;border-radius:5px">
        <option value="">Todas as qualidades</option>
        <option value="Q">🔥 Quente</option>
        <option value="M">☀️ Morno</option>
        <option value="F">❄️ Frio</option>
      </select>
      <input type="date" id="tf-from" onchange="applyTableFilter()" style="background:#0f0f13;border:1px solid var(--brd2);color:var(--tx);font-family:'Barlow',sans-serif;font-size:11px;padding:6px 9px;border-radius:5px"/>
      <span style="color:var(--brd2)">—</span>
      <input type="date" id="tf-to" onchange="applyTableFilter()" style="background:#0f0f13;border:1px solid var(--brd2);color:var(--tx);font-family:'Barlow',sans-serif;font-size:11px;padding:6px 9px;border-radius:5px"/>
      <button onclick="clearTableFilter()" style="background:transparent;border:1px solid var(--brd2);color:var(--tx2);font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:1.2px;text-transform:uppercase;padding:6px 12px;border-radius:5px;cursor:pointer;margin-left:auto">↺ Limpar</button>
    </div>`;

  const thUnit = tab==='all'?'<th>Unidade</th>':'';
  const rows = f.map((d,i)=>{
    const dt=d.date?d.date.split('-').reverse().slice(0,2).join('/'):'-';
    return`<tr>
      <td style="color:var(--tx3);font-family:'JetBrains Mono',monospace;font-size:11px">${String(i+1).padStart(3,'0')}</td>
      <td style="font-family:'Barlow Condensed',sans-serif;color:var(--tx)">${dt}</td>
      ${tab==='all'?`<td style="color:var(--tx2);font-family:'Barlow Condensed',sans-serif;font-weight:500">${d.unit}</td>`:''}
      <td><span style="font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;color:var(--tx)">${VNAMES[d.vehicle]||d.vehicle}</span></td>
      <td><span class="pill p${d.quality}">${d.quality==='Q'?'🔥':d.quality==='M'?'☀️':'❄️'} ${d.quality==='Q'?'Quente':d.quality==='M'?'Morno':'Frio'}</span></td>
      <td style="color:var(--tx);font-weight:600">${d.name}</td>
      <td>${d.city}</td>
      <td>${d.phone?`<a href="https://wa.me/${d.phone.startsWith('55')?d.phone:'55'+d.phone}" target="_blank" style="display:inline-flex;align-items:center;gap:6px;background:linear-gradient(180deg,rgba(37,211,102,.15),rgba(37,211,102,.05));border:1px solid rgba(37,211,102,.35);color:#25D366;text-decoration:none;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.5px;padding:4px 10px;border-radius:999px;transition:all .2s" onmouseover="this.style.boxShadow='0 0 14px -2px rgba(37,211,102,.5)'" onmouseout="this.style.boxShadow='none'">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="#25D366"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.128.558 4.122 1.532 5.858L0 24l6.334-1.507A11.95 11.95 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.885 0-3.65-.49-5.19-1.348l-.372-.22-3.762.895.951-3.658-.242-.386A9.937 9.937 0 0 1 2 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/></svg>
        Abrir</a>`:'<span style="color:var(--tx3);font-size:11px">—</span>'}</td>
    </tr>`;
  }).join('');

  html+=tableFiltersHTML;
  html+=`<div class="tw" id="leads-table-wrap"><div class="tscroll">
    <table class="lt"><thead><tr><th>#</th><th>Data</th>${thUnit}<th>Modelo</th><th>Qualidade</th><th>Lead</th><th>Cidade</th><th>WhatsApp</th></tr></thead>
    <tbody>${rows||'<tr><td colspan="8" style="padding:30px;text-align:center;color:var(--tx3)">Nenhum lead encontrado com os filtros aplicados.</td></tr>'}</tbody></table>
  </div>${tot?`<div class="tfooter"><span>${tot} lead${tot!==1?'s':''}</span><span>🔥 ${Q} quente${Q!==1?'s':''} · ☀️ ${M} morno${M!==1?'s':''} · ❄️ ${F} frio${F!==1?'s':''}</span></div>`:''}</div>`;

  html+=`<div class="qleg">
    <div><span style="background:#ff2d2d;color:#ff2d2d"></span>Quente = Imediato ou Próximos 15 dias + entrada/veículo na troca</div>
    <div><span style="background:#f59e0b;color:#f59e0b"></span>Morno = Próximos 15 dias sem entrada, ou Em até 30 dias + entrada</div>
    <div><span style="background:#3b82f6;color:#3b82f6"></span>Frio = Apenas pesquisando / Avaliando / Sem entrada definida</div>
  </div>`;

  document.getElementById('content').innerHTML = html;
}

// ── AUTO-REFRESH ─────────────────────────────────────────────────────────
const REFRESH_SEC = 5 * 60;
let countdown = REFRESH_SEC;
let countTimer = null;

function startCountdown() {
  clearInterval(countTimer);
  countdown = REFRESH_SEC;
  countTimer = setInterval(() => {
    countdown--;
    const m = String(Math.floor(countdown/60)).padStart(2,'0');
    const s = String(countdown % 60).padStart(2,'0');
    const el = document.getElementById('ts');
    if(!el) return;
    const now = new Date();
    const hm = now.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    const dt = now.toLocaleDateString('pt-BR');
    el.innerHTML = `Atualizado ${dt} às ${hm} &nbsp;·&nbsp; <span style="color:#fbbf24">↺ ${m}:${s}</span>`;
    if(countdown <= 0){ clearInterval(countTimer); loadData(); }
  }, 1000);
}

// ── TABLE FILTERS ─────────────────────────────────────────────────────────
function applyTableFilter(){
  const unit    = (document.getElementById('tf-unit')?.value||'').toLowerCase();
  const vehicle = (document.getElementById('tf-vehicle')?.value||'').toLowerCase();
  const quality = (document.getElementById('tf-quality')?.value||'').toLowerCase();
  const from    = document.getElementById('tf-from')?.value||'';
  const to      = document.getElementById('tf-to')?.value||'';
  const tbody = document.querySelector('#leads-table-wrap tbody');
  if(!tbody) return;
  let shown=0;
  tbody.querySelectorAll('tr').forEach(tr=>{
    const tds = tr.querySelectorAll('td');
    if(!tds.length){ tr.style.display=''; return; }
    const rowText = tr.textContent.toLowerCase();
    let ok = true;
    if(unit    && !rowText.includes(unit))    ok=false;
    if(vehicle && !rowText.includes(VNAMES[vehicle.toUpperCase()]?.toLowerCase()||vehicle)) ok=false;
    if(quality){
      const ql = quality==='q'?'quente':quality==='m'?'morno':'frio';
      if(!rowText.includes(ql)) ok=false;
    }
    if(from||to){
      const dateText = tds[1]?.textContent||'';
      const parts = dateText.split('/');
      if(parts.length===2){
        const now = new Date();
        const rowDate = `${now.getFullYear()}-${parts[1].padStart(2,'0')}-${parts[0].padStart(2,'0')}`;
        if(from && rowDate<from) ok=false;
        if(to   && rowDate>to)   ok=false;
      }
    }
    tr.style.display = ok?'':'none';
    if(ok) shown++;
  });
}
function clearTableFilter(){
  ['tf-unit','tf-vehicle','tf-quality','tf-from','tf-to'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.value='';
  });
  applyTableFilter();
}

['fd','ft','fv','fq'].forEach(id=>document.getElementById(id).addEventListener('change',render));

// ── INIT ──────────────────────────────────────────────────────────────────
loadData();
